.common-excludes: &common_excludes
  - "**/.venv/**"
  - "**/__pycache__/**"

.common-setup: &common_setup
  - run: |
      if ! command -v python3 >/dev/null 2>&1; then
        echo "python3 is required for pre-commit hooks." >&2
        exit 1
      fi
      if ! command -v uv >/dev/null 2>&1; then
        echo "uv is required for pre-commit hooks." >&2
        exit 1
      fi
      if ! command -v bun >/dev/null 2>&1; then
        echo "bun is required for pre-commit hooks." >&2
        exit 1
      fi

.python-globs: &python_globs
  - "pttman/**/*.py"
  - "tests/*.py"

.md-format-base: &md-format-base
  priority: 1
  glob: "*.md"
  exclude: *common_excludes

.ruff-check-base: &ruff-check-base
  priority: 1
  glob: *python_globs
  exclude: *common_excludes

.ty-check-base: &ty-check-base
  priority: 2
  glob: *python_globs
  exclude: *common_excludes

.unit-tests-base: &unit-tests-base
  priority: 3
  glob: *python_globs
  exclude: *common_excludes
  run: python3 -m unittest discover -s tests -v

pre-commit:
  parallel: true
  output: true
  setup: *common_setup
  commands:
    md-format:
      <<: *md-format-base
      run: bun run fix:md:file {staged_files}
      stage_fixed: true
    ruff-check:
      <<: *ruff-check-base
      run: uvx ruff check {staged_files}
    ty-check:
      <<: *ty-check-base
      run: uvx ty check {staged_files}
    unit-tests: *unit-tests-base

check:
  parallel: true
  output: true
  setup: *common_setup
  commands:
    md-format:
      <<: *md-format-base
      run: bun run fix:md:file {all_files}
    ruff-check:
      <<: *ruff-check-base
      run: uvx ruff check {all_files}
    ty-check:
      <<: *ty-check-base
      run: uvx ty check {all_files}
    unit-tests: *unit-tests-base
