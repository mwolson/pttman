.common-excludes: &common_excludes
  - "**/__pycache__/**"
  - "**/.venv/**"

pre-commit:
  parallel: true
  output: true
  setup:
    - run: |
        if ! command -v python3 >/dev/null 2>&1; then
          echo "python3 is required for pre-commit hooks." >&2
          exit 1
        fi
        if ! command -v uv >/dev/null 2>&1; then
          echo "uv is required for pre-commit hooks." >&2
          exit 1
        fi
        if ! command -v bun >/dev/null 2>&1; then
          echo "bun is required for pre-commit hooks." >&2
          exit 1
        fi
  commands:
    md-format:
      priority: 1
      glob: "*.md"
      exclude: *common_excludes
      run: bun run fix:md:file {staged_files}
      stage_fixed: true
    ruff-check:
      priority: 1
      glob:
        - "pttman"
        - "tests/*.py"
      exclude: *common_excludes
      run: uvx ruff check {staged_files}
    ty-check:
      priority: 2
      glob:
        - "pttman"
        - "tests/*.py"
      exclude: *common_excludes
      run: uvx ty check {staged_files}
    unit-tests:
      priority: 3
      glob:
        - "pttman"
        - "tests/*.py"
      exclude: *common_excludes
      run: python3 -m unittest discover -s tests -v
